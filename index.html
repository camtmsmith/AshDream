<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chalk — Gymnastics Session Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: Inter, system-ui, sans-serif; }
    .disp { font-family: 'Barlow Semi Condensed', system-ui, sans-serif; }
    input:focus, select:focus { outline: 2px solid #211a4d; outline-offset: 1px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data (unchanged from V3): skills, warm-ups, MAG ALP pathway matrix -->
  <script src="data.js"></script>

  <!-- New in V4: pure-JS helpers for reading a GymOrgPro backup export -->
  <script src="gymorg-bridge.js"></script>

  <!-- App runtime: React 18 + ReactDOM + the app, prebundled into one plain
       script by esbuild. No in-browser Babel, no XHR — so this works when you
       just double-click index.html (file://). Edit app.jsx and rebuild to
       regenerate app.js. -->
  <script src="app.js"></script>
</body>
</html>
