<style>
  :root {
    --bg: #ffffff;
    --border: #d8d2c4;
    --border-light: #e8e4d9;
    --header-bg: #f4f1ea;
    --text: #3f3a34;
    --text-muted: #6b6456;
    --gold: #d4af37;
    --silver: #b8b8b8;
    --bronze: #c98a4b;
    --badge-bg: #efece2;
    --badge-fg: #5a5346;
  }
  * { box-sizing: border-box; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }
  .toolbar p {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0;
  }
  select {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
  }
  .table-container {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 760px;
  }
  th, td {
    padding: 9px 12px;
    white-space: nowrap;
    font-size: 13.5px;
    border-bottom: 1px solid var(--border-light);
    text-align: left;
  }
  th {
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text);
    border-bottom: 2px solid var(--border);
    background: var(--header-bg);
  }
  th.no-sort { cursor: default; }
  th .th-inner {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .sort-icon { opacity: 0.35; font-size: 11px; }
  .sort-icon.active { opacity: 1; }
  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--badge-bg);
    color: var(--badge-fg);
    font-weight: 700;
    font-size: 12px;
  }
  .badge.gold { background: var(--gold); color: #fff; }
  .badge.silver { background: var(--silver); color: #fff; }
  .badge.bronze { background: var(--bronze); color: #fff; }
  .score-cell {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .score-text {
    font-size: 12.5px;
    color: var(--text-muted);
  }
  .dash { color: #b7b0a0; }
  .name-cell { font-weight: 600; }
  .state-cell { color: var(--text-muted); }
  .total-cell { font-weight: 700; }
</style>

const DAYS = { "Round 1": DAY1, "Round 2": DAY2 };

const APPARATUS = [
  { key: "floor", label: "Floor" },
  { key: "pommel", label: "Pommel Horse" },
  { key: "rings", label: "Rings" },
  { key: "vault", label: "Vault" },
  { key: "pbars", label: "Parallel Bars" },
  { key: "hbar", label: "High Bar" },
];

let state = {
  day: "Round 1",
  sortKey: "total",
  sortDir: "asc",
};

function computeTotal(row) {
  return APPARATUS.reduce((sum, a) => sum + (row[a.key] ?? 0), 0);
}

function rankApparatus(data, key) {
  const scored = data
    .map((row, idx) => ({ idx, score: row[key] }))
    .filter((r) => r.score != null)
    .sort((a, b) => b.score - a.score);

  const ranks = new Array(data.length).fill(null);
  let i = 0;
  while (i < scored.length) {
    let j = i;
    while (j + 1 < scored.length && scored[j + 1].score === scored[i].score) j++;
    const rank = i + 1;
    for (let k = i; k <= j; k++) ranks[scored[k].idx] = rank;
    i = j + 1;
  }
  return ranks;
}

function getEnriched() {
  const raw = DAYS[state.day];
  const withTotal = raw.map((r) => ({ ...r, total: computeTotal(r) }));
  const rankMaps = {};
  APPARATUS.forEach((a) => {
    rankMaps[a.key] = rankApparatus(withTotal, a.key);
  });
  const totalRanks = rankApparatus(withTotal, "total");
  return withTotal.map((row, idx) => {
    const ranks = {};
    APPARATUS.forEach((a) => {
      ranks[a.key] = rankMaps[a.key][idx];
    });
    ranks.total = totalRanks[idx];
    return { ...row, ranks };
  });
}

function getSorted() {
  const enriched = getEnriched();
  const copy = [...enriched];
  copy.sort((a, b) => {
    let av, bv;
    if (state.sortKey === "name") {
      const cmp = a.name.localeCompare(b.name);
      return state.sortDir === "asc" ? cmp : -cmp;
    } else if (state.sortKey === "total") {
      av = a.total;
      bv = b.total;
    } else {
      av = a.ranks[state.sortKey] ?? Infinity;
      bv = b.ranks[state.sortKey] ?? Infinity;
    }
    const cmp = av - bv;
    return state.sortDir === "asc" ? cmp : -cmp;
  });
  return copy;
}

function badgeHtml(rank, score) {
  if (rank == null) return '<span class="dash">—</span>';
  let cls = "badge";
  if (rank === 1) cls += " gold";
  else if (rank === 2) cls += " silver";
  else if (rank === 3) cls += " bronze";
  return `
    <span class="score-cell">
      <span class="${cls}">${rank}</span>
      <span class="score-text">(${score.toFixed(3)})</span>
    </span>
  `;
}

function sortIconHtml(colKey) {
  if (state.sortKey !== colKey) return '<span class="sort-icon">⇅</span>';
  return `<span class="sort-icon active">${state.sortDir === "asc" ? "▲" : "▼"}</span>`;
}

function renderHead() {
  const thead = document.getElementById("tableHead");
  thead.innerHTML = `
    <tr>
      <th data-sort="total"><div class="th-inner">Place ${sortIconHtml("total")}</div></th>
      <th data-sort="name"><div class="th-inner">Gymnast ${sortIconHtml("name")}</div></th>
      <th class="no-sort">State</th>
      ${APPARATUS.map(
        (a) => `<th data-sort="${a.key}"><div class="th-inner">${a.label} ${sortIconHtml(a.key)}</div></th>`
      ).join("")}
      <th class="no-sort">Total</th>
    </tr>
  `;
  thead.querySelectorAll("th[data-sort]").forEach((th) => {
    th.addEventListener("click", () => {
      const key = th.getAttribute("data-sort");
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = key;
        state.sortDir = "asc";
      }
      render();
    });
  });
}

function renderBody() {
  const tbody = document.getElementById("tableBody");
  const sorted = getSorted();
  tbody.innerHTML = sorted
    .map(
      (row) => `
    <tr>
      <td class="total-cell">${badgeHtml(row.ranks.total, row.total)}</td>
      <td class="name-cell">${row.name}</td>
      <td class="state-cell">${row.state}</td>
      ${APPARATUS.map((a) => `<td>${badgeHtml(row.ranks[a.key], row[a.key])}</td>`).join("")}
      <td class="total-cell">${row.total.toFixed(3)}</td>
    </tr>
  `
    )
    .join("");
}

function renderDaySelect() {
  const select = document.getElementById("daySelect");
  if (select.options.length === 0) {
    Object.keys(DAYS).forEach((d) => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      select.appendChild(opt);
    });
    select.value = state.day;
    select.addEventListener("change", (e) => {
      state.day = e.target.value;
      render();
    });
  }
}

function render() {
  renderDaySelect();
  renderHead();
  renderBody();
}

render();
